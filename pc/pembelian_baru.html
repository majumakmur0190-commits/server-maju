<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Transaksi Pembelian</title>
    <link href="../css/pc.css" rel="stylesheet">

    <style>
        .item-list-container::-webkit-scrollbar { width: 8px; }
        .item-list-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .item-list-container::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        .item-list-container::-webkit-scrollbar-thumb:hover { background: #555; }
        .form-input, #pembelianForm input, #pembelianForm button { font-size: 12px; }
        .header-kolom { font-size: 13px; font-weight: 600; color: #555; }
        .grid-kolom { display: grid; grid-template-columns: 0.4fr 3.5fr 1.5fr 1fr 1fr 1fr 0.5fr; }
        .header-kolom div { padding: 1px 1px; border-bottom: 1px solid #ddd; }
        .cart-row { gap: 2px; align-items: center; padding: 4px 3px; border-bottom: 1px solid #e5e7eb; background: #ffffff; transition: background 0.2s ease; }
        .cart-row:hover { background: #f9fafb; }
        .cart-item-number { font-size: 12px; color: #777; }
        .cart-item-name { font-size: 12px; font-weight: 600; line-height: 1.2; color: #333; }
        .cart-input { width: 100%; padding: 4px 6px; border: 1px solid #ccc; border-radius: 6px; font-size: 12px; }
        .cart-subtotal { text-align: center; font-size: 12px; font-weight: 600; }
        .cart-remove-btn { font-size: 20px; color: #e11d48; cursor: pointer; line-height: 1; transition: 0.2s; }
        .cart-remove-btn:hover { color: #be123c; }
    </style>
</head>
 
<body class="bg-gray-100 font-sans h-screen">

    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <main class="w-full h-full flex flex-col bg-white">

        <!-- GRID: left + right -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-0 flex-grow overflow-hidden">

            <!-- LEFT COLUMN -->
            <div class="lg:col-span-2 bg-white rounded-xl shadow-lg flex flex-col overflow-hidden">

                <!-- FORM SECTION -->
                <form id="pembelianForm" class="p-4 flex-shrink-0">
                    <input value="" type="hidden" id="user_id" />
                    <input value="" type="hidden" id="pembelian_id" />

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <!-- Suplier -->
                        <div>
                            <label class="block text-sm font-medium">Suplier</label>
                            <div class="flex">
                                <input type="text" id="nama_suplier_display" value="PILIH SUPLIER" readonly
                                    class="w-full px-3 py-2 border border-r-0 rounded-l-lg bg-gray-50 cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary">
                                <button type="button" id="btnPilihSuplier"
                                    class="px-4 py-2 bg-gray-200 rounded-r-lg hover:bg-gray-300">Cari</button>
                            </div>
                            <input type="hidden" id="suplier_id" />
                        </div>

                        <!-- Tanggal & Keterangan -->
                        <div>
                            <div>
                                <label class="block text-sm font-medium">Tanggal</label>
                                <input type="date" id="tanggal" class="w-full px-3 py-2 border rounded-lg">
                            </div>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-sm font-medium">Keterangan</label>
                            <input type="text" id="keterangan" placeholder="Catatan pembelian..." class="w-full px-3 py-2 border rounded-lg">
                        </div>
                    </div>

                    <!-- Header Keranjang -->
                    <div class="grid-kolom header-kolom text-sm font-semibold text-gray-600 px-0 py-0">
                        <div>No</div>
                        <div>Barang</div>
                        <div>Expired</div>
                        <div>Jumlah</div>
                        <div>Harga Beli (Rp)</div>
                        <div>Subtotal (Rp)</div>
                        <div></div>
                    </div>
                </form>

                <!-- CART ITEMS -->
                <div id="cart-items" class="flex-grow overflow-y-auto item-list-container p-2 min-h-0"></div>

                <!-- STICKY FOOTER -->
                <div class="p-4 border-t bg-white flex-shrink-0">
                    <div class="text-right font-bold text-3xl mb-3">
                        Total: <span id="grandTotal">Rp 0</span>
                    </div>

                    <div class="flex justify-end gap-3">
                        <a href="pembelian.html" class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">Kembali</a>
                        <button type="submit" form="pembelianForm"
                            class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-secondary font-semibold">
                            Simpan Pembelian
                        </button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN (Product Search) -->
            <div class="bg-white rounded-xl shadow-lg flex flex-col overflow-hidden">
                <div class="p-3 border-b flex items-center gap-2 flex-shrink-0">
                    <input id="productSearchInput" type="text" placeholder="Cari barang..."
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none">
                    <button id="syncButton" class="p-2 bg-gray-200 hover:bg-gray-300 rounded-lg">🔄</button>
                </div>
                <div id="syncStatus" class="px-4 text-xs text-gray-500 flex-shrink-0"></div>
                <div id="product-list" class="overflow-y-auto item-list-container p-3 space-y-2 flex-grow min-h-0"></div>
                <div id="product-pagination-controls" class="p-2 border-t flex items-center justify-between text-xs flex-shrink-0">
                    <button id="product-prev-page" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">Prev</button>
                    <span id="product-page-info"></span>
                    <button id="product-next-page" class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">Next</button>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL PILIH SUPLIER -->
    <div id="suplierModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[60]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-[90%] max-w-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-2xl font-bold mb-5 text-primary">Pilih Suplier</h2>
            <input type="text" id="suplierSearchInput" placeholder="Cari nama atau kode suplier..."
                class="w-full px-4 py-2 border rounded-lg mb-5 focus:ring-2 focus:ring-primary outline-none">
            
            <div id="suplierList" class="max-h-[60vh] overflow-y-auto space-y-1 item-list-container pr-2"></div>

            <div class="p-2 border-t flex items-center justify-between text-sm mt-5">
                <button id="suplier-prev-page" class="px-4 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">Prev</button>
                <span id="suplier-page-info"></span>
                <button id="suplier-next-page" class="px-4 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">Next</button>
            </div>

            <div class="flex justify-end mt-5">
                <button id="btnBatalSuplier" class="px-5 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">Batal</button>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
    <script src="./js/pembelian_baru.js"></script>
    <script>
        // Set tanggal hari ini
        document.getElementById('tanggal').valueAsDate = new Date();
    </script>
</body>
</html>
