<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <title>Data Pelanggan</title>
    <link href="../css/pc.css" rel="stylesheet">
</head>

<body class="bg-gray-100 h-screen overflow-hidden font-sans">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Konten utama -->
    <main class="ml-16 group-hover:ml-56 transition-all duration-300 p-4 overflow-y-auto h-full">
        <!-- 🔍 Form Pencarian -->
        <div class="flex items-center justify-between mb-6">
            <input id="searchInput" type="text" placeholder="Cari pelanggan..."
                class="px-4 py-2 border rounded-lg w-1/3 focus:outline-none focus:ring-2 focus:ring-primary" />
            <button onclick="openForm()" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-secondary">+
                Tambah Pelanggan</button>
        </div>

        <!-- 📋 Tabel Pelanggan -->
        <div class="overflow-x-auto bg-white rounded-xl shadow">
            <table class="min-w-full text-sm text-left text-gray-600">
                <thead class="bg-primary text-white">
                    <tr>
                        <th class="px-6 py-3">ID</th>
                        <th class="px-6 py-3">Nama Pelanggan</th>
                        <th class="px-6 py-3">Alamat</th>
                        <th class="px-6 py-3">No. Telepon</th>
                        <th class="px-6 py-3 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="pelangganTable"></tbody>
            </table>
            <!-- Pagination Controls -->
            <div id="pagination-controls" class="flex items-center justify-between p-4 border-t">
                <button id="prev-page"
                    class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed">Sebelumnya</button>
                <span id="page-info" class="text-sm text-gray-700"></span>
                <button id="next-page"
                    class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed">Berikutnya</button>
            </div>
        </div>
    </main>

    <!-- 🧾 Modal Form -->
    <div id="formModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">
        <div class="bg-white rounded-xl shadow-lg p-6 w-96">
            <h2 id="formTitle" class="text-xl font-bold mb-4">Tambah Pelanggan</h2>
            <form id="pelangganForm" class="space-y-4">
                <input type="hidden" id="pelanggan_id" />
                <div>
                    <label class="block text-sm font-medium">Nama Pelanggan</label>
                    <input id="nama_pelanggan" type="text"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary" required />
                </div>
                <div>
                    <label class="block text-sm font-medium">Alamat</label>
                    <textarea id="alamat" rows="3"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium">No. Telepon</label>
                    <input id="no_telepon" type="text"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary" />
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeForm()" class="px-4 py-2 bg-gray-300 rounded-lg">Batal</button>
                    <button type="submit"
                        class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-secondary">Simpan</button>
                </div>
            </form>
        </div>
    </div>
    <script src="./js/main.js"></script>
    <script>
        initializeApp(); // Panggil fungsi dari main.js

        const apiUrl = "../api/pelanggan.php"; // Ubah ke API pelanggan
        const tableBody = document.getElementById("pelangganTable"); // Ubah ID tabel
        const formModal = document.getElementById("formModal");
        const form = document.getElementById("pelangganForm"); // Ubah ID form

        // Variabel untuk data dan paginasi
        let allPelanggan = [];
        let filteredPelanggan = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        // Elemen paginasi
        const paginationControls = document.getElementById('pagination-controls');
        const prevButton = document.getElementById('prev-page');
        const nextButton = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');

        // 🔹 Ambil semua data pelanggan sekali saja
        async function fetchAllPelanggan() {
            tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-gray-500">Memuat...</td></tr>`;
            try {
                const res = await fetch(apiUrl);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    allPelanggan = result.data;
                    filterAndDisplayPelanggan();
                } else {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-gray-500">Gagal memuat data.</td></tr>`;
                }
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-red-500">Gagal terhubung ke server.</td></tr>`;
            }
        }

        // 🔹 Filter dan tampilkan data berdasarkan halaman
        function filterAndDisplayPelanggan(keyword = "", page = 1) {
            currentPage = page;
            const lowerKeyword = keyword.toLowerCase();

            filteredPelanggan = allPelanggan.filter(p =>
                p.nama_pelanggan.toLowerCase().includes(lowerKeyword) ||
                (p.alamat && p.alamat.toLowerCase().includes(lowerKeyword)) ||
                (p.no_telepon && p.no_telepon.includes(lowerKeyword))
            );

            const totalItems = filteredPelanggan.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filteredPelanggan.slice(startIndex, endIndex);

            renderTable(paginatedItems, startIndex);
            renderPagination(totalItems, totalPages);
        }

        // 🔹 Render tabel
        function renderTable(data, startIndex) {
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-gray-500">Tidak ada data ditemukan.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map((p, index) => {
                const row = `
                    <tr class="border-b hover:bg-gray-50">
                        <td class="px-6 py-3">${p.pelanggan_id}</td>
                        <td class="px-6 py-3">${p.nama_pelanggan}</td>
                        <td class="px-6 py-3">${p.alamat || '-'}</td>
                        <td class="px-6 py-3">${p.no_telepon || '-'}</td>
                        <td class="px-6 py-3 text-center space-x-2">
                            <button onclick='editPelanggan(${JSON.stringify(p)})' class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs">Edit</button>
                            <button onclick='deletePelanggan(${p.pelanggan_id})' class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-xs">Hapus</button>
                        </td>
                    </tr>`;
                return row;
            }).join('');
        }

        // 🔹 Render kontrol paginasi
        function renderPagination(totalItems, totalPages) {
            if (totalPages > 1) {
                paginationControls.style.display = 'flex';
                pageInfo.textContent = `Halaman ${currentPage} dari ${totalPages} (${totalItems} item)`;
                prevButton.disabled = currentPage === 1;
                nextButton.disabled = currentPage === totalPages;
            } else {
                paginationControls.style.display = 'none';
            }
        }

        // 🔹 Pencarian realtime
        document.getElementById("searchInput").addEventListener("input", e => {
            filterAndDisplayPelanggan(e.target.value, 1);
        });

        // 🔹 Buka & Tutup Form
        function openForm() {
            form.reset();
            document.getElementById("pelanggan_id").value = ""; // Ubah ID
            document.getElementById("formTitle").textContent = "Tambah Pelanggan"; // Ubah judul
            formModal.classList.remove("hidden");
        }

        function closeForm() {
            formModal.classList.add("hidden");
        }

        // 🔹 Edit Pelanggan
        function editPelanggan(p) { // Ubah nama fungsi dan variabel
            openForm();
            document.getElementById("formTitle").textContent = "Edit Pelanggan"; // Ubah judul
            document.getElementById("pelanggan_id").value = p.pelanggan_id; // Ubah ID
            document.getElementById("nama_pelanggan").value = p.nama_pelanggan; // Ubah ID
            document.getElementById("alamat").value = p.alamat; // Ubah ID
            document.getElementById("no_telepon").value = p.no_telepon; // Tambah field
        }


        // 🔹 Simpan Data
        form.addEventListener("submit", async e => {
            e.preventDefault();
            const submitButton = form.querySelector('button[type="submit"]');
            const id = document.getElementById("pelanggan_id").value; // Ubah ID
            const nama = document.getElementById("nama_pelanggan").value; // Ubah ID
            const alamat = document.getElementById("alamat").value; // Ubah ID
            const no_telepon = document.getElementById("no_telepon").value; // Tambah field

            const dataToSend = {
                nama_pelanggan: nama,
                alamat: alamat,
                no_telepon: no_telepon
            };

            let url = apiUrl;
            let method = "POST";

            if (id) {
                dataToSend.pelanggan_id = id; // Ubah ID
                url = `${apiUrl}?id=${id}`; // Append ID to URL for PUT/DELETE
                method = "PUT";
            }

            // Tampilkan loading
            submitButton.disabled = true;
            submitButton.textContent = 'Menyimpan...';

            const res = await fetch(url, {
                method: method,
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dataToSend)
            });
            const result = await res.json();

            // Kembalikan tombol ke normal
            submitButton.disabled = false;
            submitButton.textContent = 'Simpan';

            customAlert(result.message || "Data tersimpan!");
            closeForm(); // Tutup modal
            fetchAllPelanggan(); // Muat ulang semua data
        });

        // 🔹 Hapus Data
        async function deletePelanggan(id) { // Ubah nama fungsi
            customConfirm("Yakin ingin menghapus data ini?", async () => {
                const res = await fetch(`${apiUrl}?id=${id}`, { method: "DELETE" });
                const result = await res.json();
                customAlert(result.message || "Data dihapus!");
                fetchAllPelanggan(); // Muat ulang semua data
            });
        }

        // 🔹 Event Listener untuk tombol paginasi
        prevButton.addEventListener('click', () => {
            if (currentPage > 1) filterAndDisplayPelanggan(document.getElementById("searchInput").value, currentPage - 1);
        });
        nextButton.addEventListener('click', () => {
            const totalPages = Math.ceil(filteredPelanggan.length / itemsPerPage);
            if (currentPage < totalPages) filterAndDisplayPelanggan(document.getElementById("searchInput").value, currentPage + 1);
        });


        // 🔹 Load data awal
        fetchAllPelanggan();
    </script>
</body>

</html>
