<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Transaksi Penjualan</title>
    <link href="../css/pc.css" rel="stylesheet">

    <style>
        /* Custom scrollbar */
        .item-list-container::-webkit-scrollbar {
            width: 8px;
        }

        .item-list-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .item-list-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .item-list-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* ============================
   UMUM: Ukuran Huruf
===============================*/
        .form-input,
        #penjualanForm input,
        #penjualanForm button {
            font-size: 12px;
            /* Ukuran default form */
        }

        .header-kolom {
            font-size: 13px;
            /* Header keranjang */
            font-weight: 600;
            color: #555;
        }

        /* ============================
   GRID KERANJANG – LEBAR KOLOM
===============================*/
        /* Pastikan grid selalu 12 kolom */
        .grid-kolom {
            display: grid;
            grid-template-columns:
                0.4fr
                /* No */
                5fr
                /* Barang */
                1fr
                /* Jumlah */
                1fr
                /* Harga */
                1fr
                /* Subtotal */
                0.5fr;
            /* Aksi (hapus) */
        }

        /* Header keranjang */
        .header-kolom div {
            padding: 1px 1px;
            border-bottom: 1px solid #ddd;
        }

        /* ============================
   INPUT PELANGGAN
===============================*/
        .input-pelanggan {
            font-size: 14px;
            padding: 8px 10px;
        }

        .btn-cari {
            font-size: 14px;
            padding: 8px 14px;
        }


        /* ===================================
   STYLE BARIS KERANJANG
===================================*/
        .cart-row {
            /* grid layout inherited from .grid-kolom (each row will also have class grid-kolom) */
            gap: 2px;
            align-items: center;
            padding: 4px 3px;
            border-bottom: 1px solid #e5e7eb;
            background: #ffffff;
            transition: background 0.2s ease;
        }

        .cart-row:hover {
            background: #f9fafb;
        }

        /* Nomor Urut */
        .cart-item-number {
            font-size: 12px;
            color: #777;
        }

        /* Nama Barang */
        .cart-item-name {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.2;
            color: #333;
        }

        /* Input Jumlah & Harga */
        .cart-input {
            width: 100%;
            padding: 4px 6px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 12px;
        }

        /* Subtotal */
        .cart-subtotal {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
        }

        /* Tombol hapus */
        .cart-remove-btn {
            font-size: 20px;
            color: #e11d48;
            cursor: pointer;
            line-height: 1;
            transition: 0.2s;
        }

        .cart-remove-btn:hover {
            color: #be123c;
        }
    </style>
    <script>
        // Fungsi untuk menangkap tombol yang ditekan
        function handleKeyPress(event) {
            const keyPressed = event.key;  // Menyimpan tombol yang ditekan
            if (keyPressed === "Shift") {
                //arahkan ke input pencarian
                let searchInput = document.getElementById("productSearchInput");
                searchInput.focus();
                searchInput.select();
                searchInput.value = ""; // kosongkan input
            }
            if (keyPressed === "Escape") {
                //jika modal pelanggan terbuka, tutup modal
                //jika modal pelanggan tertutup,buka modal pelanggan
                let pelangganModal = document.getElementById("pelangganModal");
                if (pelangganModal.classList.contains("hidden")) {
                    console.log("Membuka modal pelanggan");
                    openPelangganModal();
                    document.getElementById("pelangganSearchInput").focus();
                    document.getElementById("pelangganSearchInput").select();
                    document.getElementById("pelangganSearchInput").value = "";
                } else {
                    console.log("Menutup modal pelanggan");
                    closePelangganModal();
                }

            }
            console.log("Tombol yang ditekan:", keyPressed);
        }

        // Menambahkan event listener untuk menangkap peristiwa keyboard
        window.addEventListener("keydown", handleKeyPress);
    </script>
</head>
  
<body class="bg-gray-100 font-sans h-screen">
 
    <!-- <div id="sidebar-container"></div> -->

    <!-- MAIN CONTENT -->
    <main class="w-full h-full flex flex-col bg-white">

        <!-- GRID: left + right -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-0 flex-grow overflow-hidden">

            <!-- LEFT COLUMN -->
            <div class="lg:col-span-2 bg-white border-r border-gray-200 flex flex-col overflow-hidden">

                <!-- FORM SECTION (fixed height content) -->
                <form id="penjualanForm" class="p-4 flex-shrink-0">

                    <input value="" type="hidden" id="penjualan_id" />
                    <input value="" type="hidden" id="user_id" />

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                        <!-- Pelanggan -->
                        <div>
                            <label class="block text-sm font-medium">Pelanggan</label>
                            <div class="flex">
                                <input type="text" id="nama_pelanggan_display" value="PILIH PELANGGAN" readonly
                                    class="w-full px-3 py-2 border border-r-0 rounded-l-lg bg-gray-50 cursor-pointer focus:outline-none focus:ring-2 focus:ring-primary">
                                <button type="button" id="btnPilihPelanggan"
                                    class="px-4 py-2 bg-gray-200 rounded-r-lg hover:bg-gray-300">
                                    Cari
                                </button>
                            </div>
                            <input type="hidden" id="pelanggan_id" />
                        </div>

                        <div id="note" class="hidden mt-3 p-4 rounded-lg border border-yellow-300 bg-yellow-500">
                            <label class="block text-sm font-medium text-yellow-800">
                                Pelanggan tidak bisa diubah karena sudah proses histori harga.
                                Reset transaksi dan ulangi proses dari awal.
                            </label>
                        </div>

                    </div>


                    <!-- Header Keranjang -->
                    <div class="grid-kolom header-kolom text-sm font-semibold text-gray-600 px-0 py-0">
                        <div>No</div>
                        <div>Barang</div>
                        <div>Jumlah</div>
                        <div>Harga (Rp)</div>
                        <div>Subtotal (Rp)</div>
                        <div></div>
                    </div>
                </form>

                <!-- CART ITEMS (scrollable area) -->
                <div id="cart-items" class="flex-grow overflow-y-auto item-list-container p-2 min-h-0">
                    <!-- Cart items will be added here -->
                </div>

                <!-- STICKY FOOTER -->
                <div class="p-4 border-t bg-white flex-shrink-0">
                    <div class="text-right font-bold text-3xl mb-3">
                        Total: <span id="grandTotal">Rp 0</span>
                    </div>

                    <div class="flex justify-end gap-3">
                        <button type="button" id="btnReset" class="px-4 py-2 bg-red-800 text-white rounded-lg hover:bg-red-700">Reset</button>

                        <button type="button" id="btnKembali" class="px-4 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">
                            Kembali
                        </button>

                        <button type="submit" form="penjualanForm"
                            class="px-6 py-2 bg-primary text-white rounded-lg hover:bg-secondary font-semibold">
                            Simpan Transaksi
                        </button>

                        <button id="btnPrintInvoice" disabled
                            class="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 font-semibold disabled:bg-gray-400">
                            Cetak Invoice
                        </button>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="bg-white flex flex-col overflow-hidden">

                <!-- Search -->
                <div class="p-3 border-b flex items-center gap-2 flex-shrink-0">
                    <input id="productSearchInput" type="text" placeholder="Cari barang..."
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary outline-none">

                    <button id="syncButton" class="p-2 bg-gray-200 hover:bg-gray-300 rounded-lg">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-gray-600" fill="none"
                            viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path stroke-linecap="round" stroke-linejoin="round"
                                d="M4 4v5h5m-5 6v5h5m6-15h5v5m-5 6h5v5M4 9h16M4 15h16" />
                        </svg>
                    </button>
                </div>

                <div id="syncStatus" class="px-4 text-xs text-gray-500 flex-shrink-0"></div>

                <!-- Product list -->
                <div id="product-list" class="overflow-y-auto item-list-container p-3 space-y-2 flex-grow min-h-0">
                </div>

                <!-- Pagination -->
                <div id="product-pagination-controls"
                    class="p-2 border-t flex items-center justify-between text-xs flex-shrink-0">
                    <button id="product-prev-page"
                        class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">
                        Prev
                    </button>

                    <span id="product-page-info"></span>

                    <button id="product-next-page"
                        class="px-3 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">
                        Next
                    </button>
                </div>
            </div>
        </div>
    </main>

    <!-- MODAL PILIH PELANGGAN -->
    <div id="pelangganModal" class="fixed inset-0 bg-black/50 hidden flex items-center justify-center z-[60]">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-[90%] max-w-2xl max-h-[90vh] overflow-y-auto">

            <h2 class="text-2xl font-bold mb-5 text-primary">Pilih Pelanggan</h2>

            <input type="text" id="pelangganSearchInput" placeholder="Cari nama atau ID pelanggan..."
                class="w-full px-4 py-2 border rounded-lg mb-5 focus:ring-2 focus:ring-primary outline-none">

            <div id="pelangganList" class="max-h-[60vh] overflow-y-auto space-y-1 item-list-container pr-2"></div>

            <div class="p-2 border-t flex items-center justify-between text-sm mt-5">
                <button id="pelanggan-prev-page"
                    class="px-4 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">
                    Prev
                </button>

                <span id="pelanggan-page-info"></span>

                <button id="pelanggan-next-page"
                    class="px-4 py-1 bg-gray-200 rounded hover:bg-gray-300 disabled:opacity-50">
                    Next
                </button>
            </div>

            <div class="flex justify-end mt-5">
                <button id="btnBatalPelanggan" class="px-5 py-2 bg-gray-300 rounded-lg hover:bg-gray-400">
                    Batal
                </button>
            </div>

        </div>
    </div>

    <script>
        document.getElementById("btnReset").addEventListener("click", function() {
            customConfirm("Yakin ingin mereset form transaksi? Data yang belum disimpan akan hilang.", function() {
                localStorage.removeItem('penjualanData');
                location.reload();
            });
        });

        document.getElementById("btnKembali").addEventListener("click", function() {
            customConfirm("Yakin ingin kembali? Pastikan data sudah disimpan.", function() {
                window.location.href = "penjualan.html";
            });
        });
    </script>
    <script src="./js/main.js"></script>
    <script src="./js/transaksi.js"></script>

</body>

</html>
