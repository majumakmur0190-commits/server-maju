<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <title>Data Suplier</title>
    <link href="../css/pc.css" rel="stylesheet">
</head>

<body class="bg-gray-100 h-screen overflow-hidden font-sans">
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Konten utama -->
    <main class="ml-16 group-hover:ml-56 transition-all duration-300 p-4 overflow-y-auto h-full">
        <!-- 🔍 Form Pencarian -->
        <div class="flex items-center justify-between mb-6">
            <input id="searchInput" type="text" placeholder="Cari suplier (Nama, Kode, Alamat)..."
                class="px-4 py-2 border rounded-lg w-1/3 focus:outline-none focus:ring-2 focus:ring-primary" />
            <button onclick="openForm()" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-secondary">+
                Tambah Suplier</button>
        </div>

        <!-- 📋 Tabel Suplier -->
        <div class="overflow-x-auto bg-white rounded-xl shadow">
            <table class="min-w-full text-sm text-left text-gray-600">
                <thead class="bg-primary text-white">
                    <tr>
                        <th class="px-6 py-3">No</th>
                        <th class="px-6 py-3">Kode</th>
                        <th class="px-6 py-3">Nama Suplier</th>
                        <th class="px-6 py-3">Alamat</th>
                        <th class="px-6 py-3">Telepon</th>
                        <th class="px-6 py-3">Email</th>
                        <th class="px-6 py-3 text-center">Aksi</th>
                    </tr>
                </thead>
                <tbody id="suplierTable"></tbody>
            </table>
            <!-- Pagination Controls -->
            <div id="pagination-controls" class="flex items-center justify-between p-4 border-t">
                <button id="prev-page"
                    class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed">Sebelumnya</button>
                <span id="page-info" class="text-sm text-gray-700"></span>
                <button id="next-page"
                    class="px-4 py-2 bg-gray-200 rounded-lg hover:bg-gray-300 disabled:opacity-50 disabled:cursor-not-allowed">Berikutnya</button>
            </div>
        </div>
    </main>

    <!-- 🧾 Modal Form -->
    <div id="formModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-lg p-6 w-96">
            <h2 id="formTitle" class="text-xl font-bold mb-4">Tambah Suplier</h2>
            <form id="suplierForm" class="space-y-4">
                <input type="hidden" id="suplier_id" />
                <div>
                    <label class="block text-sm font-medium">Kode Suplier</label>
                    <input id="kode_suplier" type="text"
                        class="w-full px-3 py-2 border rounded-lg bg-gray-100 text-gray-500 cursor-not-allowed" readonly placeholder="Otomatis" />
                </div>
                <div>
                    <label class="block text-sm font-medium">Nama Suplier</label>
                    <input id="nama_suplier" type="text"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary" required />
                </div>
                <div>
                    <label class="block text-sm font-medium">Alamat</label>
                    <textarea id="alamat" rows="2"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary"></textarea>
                </div>
                <div>
                    <label class="block text-sm font-medium">Telepon</label>
                    <input id="telepon" type="text"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary" />
                </div>
                <div>
                    <label class="block text-sm font-medium">Email</label>
                    <input id="email" type="email"
                        class="w-full px-3 py-2 border rounded-lg focus:ring-2 focus:ring-primary" />
                </div>
                <div class="flex justify-end gap-3">
                    <button type="button" onclick="closeForm()" class="px-4 py-2 bg-gray-300 rounded-lg">Batal</button>
                    <button type="submit"
                        class="px-4 py-2 bg-primary text-white rounded-lg hover:bg-secondary">Simpan</button>
                </div>
            </form>
        </div>
    </div>

    <script src="./js/main.js"></script>
    <script>
        initializeApp();

        const apiUrl = "../api/suplier.php";
        const tableBody = document.getElementById("suplierTable");
        const formModal = document.getElementById("formModal");
        const form = document.getElementById("suplierForm");

        let allSuplier = [];
        let filteredSuplier = [];
        let currentPage = 1;
        const itemsPerPage = 10;

        const paginationControls = document.getElementById('pagination-controls');
        const prevButton = document.getElementById('prev-page');
        const nextButton = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');

        async function fetchAllSuplier() {
            tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-gray-500">Memuat data...</td></tr>`;
            try {
                const res = await fetch(apiUrl);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    allSuplier = result.data;
                    filterAndDisplaySuplier();
                } else {
                    tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-gray-500">Gagal memuat data.</td></tr>`;
                }
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-red-500">Gagal terhubung ke server.</td></tr>`;
            }
        }

        function filterAndDisplaySuplier(keyword = "", page = 1) {
            currentPage = page;
            const lowerKeyword = keyword.toLowerCase();

            filteredSuplier = allSuplier.filter(s =>
                s.nama_suplier.toLowerCase().includes(lowerKeyword) ||
                (s.kode_suplier && s.kode_suplier.toLowerCase().includes(lowerKeyword)) ||
                (s.alamat && s.alamat.toLowerCase().includes(lowerKeyword))
            );

            const totalItems = filteredSuplier.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filteredSuplier.slice(startIndex, endIndex);

            renderTable(paginatedItems, startIndex);
            renderPagination(totalItems, totalPages);
        }

        function renderTable(data, startIndex) {
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-gray-500">Tidak ada data ditemukan.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map((s, index) => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="px-6 py-3">${startIndex + index + 1}</td>
                    <td class="px-6 py-3 font-medium">${s.kode_suplier || '-'}</td>
                    <td class="px-6 py-3">${s.nama_suplier}</td>
                    <td class="px-6 py-3 truncate max-w-xs">${s.alamat || '-'}</td>
                    <td class="px-6 py-3">${s.telepon || '-'}</td>
                    <td class="px-6 py-3">${s.email || '-'}</td>
                    <td class="px-6 py-3 text-center space-x-2">
                        <button onclick='editSuplier(${JSON.stringify(s)})' class="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs">Edit</button>
                        <button onclick='deleteSuplier(${s.suplier_id})' class="bg-red-500 hover:bg-red-600 text-white px-2 py-1 rounded text-xs">Hapus</button>
                    </td>
                </tr>`).join('');
        }

        function renderPagination(totalItems, totalPages) {
            if (totalPages > 1) {
                paginationControls.style.display = 'flex';
                pageInfo.textContent = `Halaman ${currentPage} dari ${totalPages} (${totalItems} item)`;
                prevButton.disabled = currentPage === 1;
                nextButton.disabled = currentPage === totalPages;
            } else {
                paginationControls.style.display = 'none';
            }
        }

        document.getElementById("searchInput").addEventListener("input", e => {
            filterAndDisplaySuplier(e.target.value, 1);
        });

        function openForm() {
            form.reset();
            document.getElementById("suplier_id").value = "";
            document.getElementById("kode_suplier").value = "Otomatis";
            document.getElementById("formTitle").textContent = "Tambah Suplier";
            formModal.classList.remove("hidden");
        }

        function closeForm() {
            formModal.classList.add("hidden");
        }

        function editSuplier(s) {
            openForm();
            document.getElementById("formTitle").textContent = "Edit Suplier";
            document.getElementById("suplier_id").value = s.suplier_id;
            document.getElementById("kode_suplier").value = s.kode_suplier;
            document.getElementById("nama_suplier").value = s.nama_suplier;
            document.getElementById("alamat").value = s.alamat;
            document.getElementById("telepon").value = s.telepon;
            document.getElementById("email").value = s.email;
        }

        form.addEventListener("submit", async e => {
            e.preventDefault();
            const id = document.getElementById("suplier_id").value;
            const dataToSend = {
                kode_suplier: document.getElementById("kode_suplier").value,
                nama_suplier: document.getElementById("nama_suplier").value,
                alamat: document.getElementById("alamat").value,
                telepon: document.getElementById("telepon").value,
                email: document.getElementById("email").value
            };

            const url = id ? `${apiUrl}?id=${id}` : apiUrl;
            const method = id ? "PUT" : "POST";

            const res = await fetch(url, { method, headers: { "Content-Type": "application/json" }, body: JSON.stringify(dataToSend) });
            const result = await res.json();
            customAlert(result.message);
            closeForm();
            fetchAllSuplier();
        });

        async function deleteSuplier(id) {
            customConfirm("Yakin ingin menghapus suplier ini?", async () => {
                const res = await fetch(`${apiUrl}?id=${id}`, { method: "DELETE" });
                const result = await res.json();
                customAlert(result.message);
                fetchAllSuplier();
            });
        }

        prevButton.addEventListener('click', () => { if (currentPage > 1) filterAndDisplaySuplier(document.getElementById("searchInput").value, currentPage - 1); });
        nextButton.addEventListener('click', () => { const totalPages = Math.ceil(filteredSuplier.length / itemsPerPage); if (currentPage < totalPages) filterAndDisplaySuplier(document.getElementById("searchInput").value, currentPage + 1); });

        fetchAllSuplier();
    </script>
</body>

</html>
