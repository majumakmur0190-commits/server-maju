<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <title>Data Pembelian</title>
    <link rel="stylesheet" href="../node_modules/7.css/dist/7.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: #5ea0d6;
            font-family: "Segoe UI", sans-serif;
        }

        .selected-row {
            background-color: #7078ee !important;
        }

        #sidebar-container {
            width: 100%;
            flex-shrink: 0;
        }

        main {
            flex-grow: 1;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>

    <!-- Konten utama -->
    <main>
        <div class="window"
            style="height: 100%; width: 100%; border: 0; box-shadow: none; display: flex; flex-direction: column;">
            <div class="title-bar">
                <div class="title-bar-text">Data Pembelian</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <!-- 🔍 Form Pencarian -->
                <div style="padding: 10px; padding-bottom: 0; margin-bottom: 10px;">
                    <input id="searchInput" type="text" placeholder="Cari pembelian (ID, Suplier)..."
                        style="width: 100%;" />
                </div>

                <!-- 📋 Tabel Pembelian -->
                <div style="flex: 1; overflow: auto; border: 1px solid #8e8f8f; background: white;">
                    <table style="width: 100%;">
                        <thead>
                            <tr onclick="warnabaris(this)">
                                <th>ID</th>
                                <th>Tanggal</th>
                                <th>Suplier</th>
                                <th>User</th>
                                <th style="text-align: right;">Total (Rp)</th>
                                <th style="text-align: center;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="pembelianTable"></tbody>
                    </table>
                </div>
                <!-- Pagination Controls -->
                <div id="pagination-controls"
                    style="padding: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <button id="prev-page">Sebelumnya</button>
                    <span id="page-info"></span>
                    <button id="next-page">Berikutnya</button>
                </div>
            </div>
        </div>
    </main>

    <script src="./js/main.js"></script>
    <script>
        // Panggil fungsi dari main.js
        initializeApp();

        const SERVER_IP = localStorage.getItem('server_ip') || 'localhost';
        const API_URL_PEMBELIAN = `http://${SERVER_IP}:1987/maju/api/pembelian.php`;

        const pembelianTableBody = document.getElementById("pembelianTable");
        const searchInput = document.getElementById("searchInput");

        // Variabel untuk data dan paginasi
        let allPembelian = [];
        let filteredPembelian = [];
        let currentPage = 1;
        const itemsPerPage = parseInt(localStorage.getItem('pagination_limit')) || 10;

        // Elemen paginasi
        const paginationControls = document.getElementById('pagination-controls');
        const prevButton = document.getElementById('prev-page');
        const nextButton = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');

        // Helper: Format angka ke Rupiah
        const formatRupiah = (number) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        };

        // 🔹 Ambil semua data pembelian
        async function fetchAllPembelian() {
            pembelianTableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-gray-500">Memuat...</td></tr>`;

            try {
                const res = await fetch(API_URL_PEMBELIAN);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    allPembelian = result.data;
                    filterAndDisplayPembelian(searchInput.value, 1);
                } else {
                    pembelianTableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-gray-500">Gagal memuat data.</td></tr>`;
                }
            } catch (error) {
                pembelianTableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-red-500">Gagal terhubung ke server.</td></tr>`;
            }
        }

        // 🔹 Filter dan tampilkan data berdasarkan halaman
        function filterAndDisplayPembelian(keyword = "", page = 1) {
            currentPage = page;
            const lowerKeyword = keyword.toLowerCase();

            filteredPembelian = allPembelian.filter(p =>
                p.pembelian_id.toString().includes(lowerKeyword) ||
                (p.nama_suplier && p.nama_suplier.toLowerCase().includes(lowerKeyword))
            );

            const totalItems = filteredPembelian.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filteredPembelian.slice(startIndex, endIndex);

            renderTable(paginatedItems);
            renderPagination(totalItems, totalPages);
        }

        // 🔹 Render tabel
        function renderTable(data) {
            if (data.length === 0) {
                pembelianTableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-gray-500">Tidak ada data ditemukan.</td></tr>`;
                return;
            }

            pembelianTableBody.innerHTML = data.map(p => {
                return `
                    <tr>
                        <td>${p.pembelian_id}</td>
                        <td>${new Date(p.tanggal).toLocaleDateString('id-ID')}</td>
                        <td>${p.nama_suplier || 'Umum'}</td>
                        <td>${p.user_nama}</td>
                        <td style="text-align: right;">${formatRupiah(p.total)}</td>
                        <td style="text-align: center;">
                            <button onclick='editPembelian(${p.pembelian_id})'>Edit</button>
                            <button onclick='deletePembelian(${p.pembelian_id})'>Hapus</button>
                        </td>
                    </tr>`;
            }).join('');
        }

        function clearSelectedRows() {
            document.querySelectorAll("#pembelianTable tr").forEach(r => {
                r.classList.remove("selected-row");
            });
        }

        function warnabaris(row) {
            const isSelected = row.classList.contains("selected-row");

            clearSelectedRows();

            if (!isSelected) {
                row.classList.add("selected-row");
            }
        }

        function renderPagination(totalItems, totalPages) {
            if (totalPages > 1) {
                paginationControls.style.display = 'flex';
                pageInfo.textContent = `Halaman ${currentPage} dari ${totalPages} (${totalItems} item)`;
                prevButton.disabled = currentPage === 1;
                nextButton.disabled = currentPage === totalPages;
            } else {
                paginationControls.style.display = 'none';
            }
        }

        // 🔹 Edit Pembelian
        function editPembelian(id) {
            window.location.href = `pembelian_baru.html?id=${id}`;
        }

        async function deletePembelian(id) {
            customConfirm("Yakin ingin menghapus pembelian ini? Stok barang akan dikurangi kembali.", async () => {
                const res = await fetch(`${API_URL_PEMBELIAN}?id=${id}`, { method: "DELETE" });
                const result = await res.json();
                customAlert(result.message || "Pembelian berhasil dihapus!");
                fetchAllPembelian();
            });
        }

        searchInput.addEventListener("input", e => filterAndDisplayPembelian(e.target.value, 1));
        prevButton.addEventListener('click', () => { if (currentPage > 1) filterAndDisplayPembelian(searchInput.value, currentPage - 1); });
        nextButton.addEventListener('click', () => { const totalPages = Math.ceil(filteredPembelian.length / itemsPerPage); if (currentPage < totalPages) filterAndDisplayPembelian(searchInput.value, currentPage + 1); });

        document.addEventListener("click", (event) => {
            if (!event.target.closest("#pembelianTable")) {
                clearSelectedRows();
            }
        });

        fetchAllPembelian();
    </script>
</body>

</html>
