<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <title>Data Suplier</title>
    <link rel="stylesheet" href="../node_modules/7.css/dist/7.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background-color: #5ea0d6;
            font-family: "Segoe UI", sans-serif;
        }

        .selected-row {
            background-color: #7078ee !important;
        }

        #sidebar-container {
            width: 100%;
            flex-shrink: 0;
        }

        main {
            flex-grow: 1;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
    </style>
</head>

<body>
    <!-- Sidebar -->
    <div id="sidebar-container"></div>
    <!-- Konten utama -->
    <main>
        <div class="window"
            style="height: 100%; width: 100%; border: 0; box-shadow: none; display: flex; flex-direction: column;">
            <div class="title-bar">
                <div class="title-bar-text">Data Suplier</div>
                <div class="title-bar-controls">
                    <button aria-label="Minimize"></button>
                    <button aria-label="Maximize"></button>
                    <button aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <!-- 🔍 Form Pencarian -->
                <div
                    style="display: flex; justify-content: space-between; padding: 10px; padding-bottom: 0; margin-bottom: 10px;">
                    <input id="searchInput" type="text" placeholder="Cari suplier (Nama, Kode, Alamat)..."
                        style="width: 300px;" />
                    <button onclick="openForm()">+ Tambah Suplier</button>
                </div>

                <!-- 📋 Tabel Suplier -->
                <div style="flex: 1; overflow: auto; border: 1px solid #8e8f8f; background: white;">
                    <table style="width: 100%;">
                        <thead>
                            <tr>
                                <th>No</th>
                                <th>Kode</th>
                                <th>Nama Suplier</th>
                                <th>Alamat</th>
                                <th>Telepon</th>
                                <th>Email</th>
                                <th style="text-align: center;">Aksi</th>
                            </tr>
                        </thead>
                        <tbody id="suplierTable"></tbody>
                    </table>
                </div>
                <!-- Pagination Controls -->
                <div id="pagination-controls"
                    style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <button id="prev-page">Sebelumnya</button>
                    <span id="page-info"></span>
                    <button id="next-page">Berikutnya</button>
                </div>
            </div>
        </div>
    </main>

    <!-- 🧾 Modal Form -->
    <div id="formModal" class="modal-overlay">
        <div class="window" style="width: 400px;">
            <div class="title-bar">
                <div class="title-bar-text" id="formTitle">Tambah Suplier</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="closeForm()"></button>
                </div>
            </div>
            <div class="window-body">
                <form id="suplierForm">
                    <input type="hidden" id="suplier_id" />
                    <div class="field-row-stacked">
                        <label for="kode_suplier">Kode Suplier</label>
                        <input id="kode_suplier" type="text" style="width: 100%;" readonly placeholder="Otomatis"
                            disabled />
                    </div>
                    <div class="field-row-stacked">
                        <label for="nama_suplier">Nama Suplier</label>
                        <input id="nama_suplier" type="text" style="width: 100%;" required />
                    </div>
                    <div class="field-row-stacked">
                        <label for="alamat">Alamat</label>
                        <textarea id="alamat" rows="2" style="width: 100%;"></textarea>
                    </div>
                    <div class="field-row-stacked">
                        <label for="telepon">Telepon</label>
                        <input id="telepon" type="text" style="width: 100%;" />
                    </div>
                    <div class="field-row-stacked">
                        <label for="email">Email</label>
                        <input id="email" type="email" style="width: 100%;" />
                    </div>
                    <div style="margin-top: 15px; text-align: right;">
                        <button type="button" onclick="closeForm()">Batal</button>
                        <button type="submit" class="default">Simpan</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
    <script>
        initializeApp();

        const SERVER_IP = localStorage.getItem('server_ip') || 'localhost';
        const apiUrl = `http://${SERVER_IP}:1987/maju/api/suplier.php`;
        const tableBody = document.getElementById("suplierTable");
        const formModal = document.getElementById("formModal");
        const form = document.getElementById("suplierForm");

        let allSuplier = [];
        let filteredSuplier = [];
        let currentPage = 1;
        const itemsPerPage = parseInt(localStorage.getItem('pagination_limit')) || 10;

        const paginationControls = document.getElementById('pagination-controls');
        const prevButton = document.getElementById('prev-page');
        const nextButton = document.getElementById('next-page');
        const pageInfo = document.getElementById('page-info');

        async function fetchAllSuplier() {
            tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-gray-500">Memuat data...</td></tr>`;
            try {
                const res = await fetch(apiUrl);
                const result = await res.json();
                if (result.status === 'success' && result.data) {
                    allSuplier = result.data;
                    filterAndDisplaySuplier();
                } else {
                    tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-gray-500">Gagal memuat data.</td></tr>`;
                }
            } catch (error) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-red-500">Gagal terhubung ke server.</td></tr>`;
            }
        }

        function filterAndDisplaySuplier(keyword = "", page = 1) {
            currentPage = page;
            const lowerKeyword = keyword.toLowerCase();

            filteredSuplier = allSuplier.filter(s =>
                s.nama_suplier.toLowerCase().includes(lowerKeyword) ||
                (s.kode_suplier && s.kode_suplier.toLowerCase().includes(lowerKeyword)) ||
                (s.alamat && s.alamat.toLowerCase().includes(lowerKeyword))
            );

            const totalItems = filteredSuplier.length;
            const totalPages = Math.ceil(totalItems / itemsPerPage);
            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            const paginatedItems = filteredSuplier.slice(startIndex, endIndex);

            renderTable(paginatedItems, startIndex);
            renderPagination(totalItems, totalPages);
        }

        function renderTable(data, startIndex) {
            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-gray-500">Tidak ada data ditemukan.</td></tr>`;
                return;
            }

            tableBody.innerHTML = data.map((s, index) => `
                <tr onclick="warnabaris(this)">
                    <td>${startIndex + index + 1}</td>
                    <td>${s.kode_suplier || '-'}</td>
                    <td>${s.nama_suplier}</td>
                    <td>${s.alamat || '-'}</td>
                    <td>${s.telepon || '-'}</td>
                    <td>${s.email || '-'}</td>
                    <td style="text-align: center;">
                        <button onclick='editSuplier(${JSON.stringify(s)})'>Edit</button>
                        <button onclick='deleteSuplier(${s.suplier_id})'>Hapus</button>
                    </td>
                </tr>`).join('');
        }

        function renderPagination(totalItems, totalPages) {
            if (totalPages > 1) {
                paginationControls.style.display = 'flex';
                pageInfo.textContent = `Halaman ${currentPage} dari ${totalPages} (${totalItems} item)`;
                prevButton.disabled = currentPage === 1;
                nextButton.disabled = currentPage === totalPages;
            } else {
                paginationControls.style.display = 'none';
            }
        }

        document.getElementById("searchInput").addEventListener("input", e => {
            filterAndDisplaySuplier(e.target.value, 1);
        });

        function clearSelectedRows() {
            document.querySelectorAll("#suplierTable tr").forEach(r => {
                r.classList.remove("selected-row");
            });
        }

        function warnabaris(row) {
            const isSelected = row.classList.contains("selected-row");

            clearSelectedRows();

            if (!isSelected) {
                row.classList.add("selected-row");
            }
        }

        function openForm() {
            form.reset();
            document.getElementById("suplier_id").value = "";
            document.getElementById("kode_suplier").value = "Otomatis";
            document.getElementById("formTitle").textContent = "Tambah Suplier";
            formModal.style.display = "flex";
        }

        function closeForm() {
            formModal.style.display = "none";
        }

        function editSuplier(s) {
            openForm();
            document.getElementById("formTitle").textContent = "Edit Suplier";
            document.getElementById("suplier_id").value = s.suplier_id;
            document.getElementById("kode_suplier").value = s.kode_suplier;
            document.getElementById("nama_suplier").value = s.nama_suplier;
            document.getElementById("alamat").value = s.alamat;
            document.getElementById("telepon").value = s.telepon;
            document.getElementById("email").value = s.email;
        }

        form.addEventListener("submit", async e => {
            e.preventDefault();
            const id = document.getElementById("suplier_id").value;
            const dataToSend = {
                kode_suplier: document.getElementById("kode_suplier").value,
                nama_suplier: document.getElementById("nama_suplier").value,
                alamat: document.getElementById("alamat").value,
                telepon: document.getElementById("telepon").value,
                email: document.getElementById("email").value
            };

            const url = id ? `${apiUrl}?id=${id}` : apiUrl;
            const method = id ? "PUT" : "POST";

            const res = await fetch(url, { method, headers: { "Content-Type": "application/json" }, body: JSON.stringify(dataToSend) });
            const result = await res.json();
            customAlert(result.message);
            closeForm();
            fetchAllSuplier();
        });

        async function deleteSuplier(id) {
            customConfirm("Yakin ingin menghapus suplier ini?", async () => {
                const res = await fetch(`${apiUrl}?id=${id}`, { method: "DELETE" });
                const result = await res.json();
                customAlert(result.message);
                fetchAllSuplier();
            });
        }

        prevButton.addEventListener('click', () => { if (currentPage > 1) filterAndDisplaySuplier(document.getElementById("searchInput").value, currentPage - 1); });
        nextButton.addEventListener('click', () => { const totalPages = Math.ceil(filteredSuplier.length / itemsPerPage); if (currentPage < totalPages) filterAndDisplaySuplier(document.getElementById("searchInput").value, currentPage + 1); });

        document.addEventListener("click", (event) => {
            if (!event.target.closest("#suplierTable")) {
                clearSelectedRows();
            }
        });

        fetchAllSuplier();
    </script>
</body>

</html>
