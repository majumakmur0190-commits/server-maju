<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <title>📦 Data Barang</title>
  <link rel="stylesheet" href="../node_modules/7.css/dist/7.css">
  <style>
    body { display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; background-color: #5ea0d6; font-family: "Segoe UI", sans-serif; }
    #sidebar-container { width: 100%; flex-shrink: 0; }
    main { flex-grow: 1; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
    .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 999; }
    .selected-row { background-color: #7078ee !important; }
  </style>
  <script>
    // Fungsi untuk menangkap tombol yang ditekan
    function handleKeyPress(event) {
      const keyPressed = event.key;  // Menyimpan tombol yang ditekan
      if (keyPressed === "Shift") {
        console.log("Tombol Shift ditekan!");
        //arahkan ke input pencarian
        let searchInput = document.getElementById("search");
        searchInput.focus();
        searchInput.select();
        searchInput.value = ""; // kosongkan input
      }
    }

    // Menambahkan event listener untuk menangkap peristiwa keyboard
    window.addEventListener("keydown", handleKeyPress);
  </script>
</head>

<body>
  <!-- Sidebar -->
  <div id="sidebar-container"></div>

  <!-- Konten utama -->
  <main>
    <div class="window" style="height: 100%; width: 100%; border: 0; box-shadow: none; display: flex; flex-direction: column;">
      <div class="title-bar">
        <div class="title-bar-text">Data Barang</div>
        <div class="title-bar-controls">
          <button aria-label="Minimize"></button>
          <button aria-label="Maximize"></button>
          <button aria-label="Close"></button>
        </div>
      </div>
      <div class="window-body" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
    <!-- 🔍 Pencarian & Tombol Tambah -->
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
          <input id="search" type="text" placeholder="Cari nama barang atau kategori..." style="width: 300px;">

          <button id="btnTambah">
        + Tambah Barang
      </button>
    </div>

    <!-- 📋 Tabel Data Barang -->
        <div style="flex: 1; overflow: auto; border: 1px solid #8e8f8f; background: white;">
          <table style="width: 100%;">
            <thead>
          <tr>
                <th style="width: 50px; text-align: center">#</th>
                <th style="width: 100px ;">Barcode</th>
                <th>Nama Barang</th>
                <th style="width: 100px; text-align: right;">Harga HNA</th>
                <th style="width: 100px; text-align: right;">Stok</th>
                <th style="width: 100px; text-align: center;">Satuan</th>
                <th style="width: 200px;text-align: center;">Aksi</th>
          </tr>
        </thead>
            <tbody id="barangTable">
        </tbody>
      </table>
        </div>

      <!-- Pagination Controls -->
        <div id="pagination-controls" style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
          <button id="prev-page">Sebelumnya</button>
          <span id="page-info"></span>
          <button id="next-page">Berikutnya</button>
      </div>
    </div>
    </div>
  </main>

  <!-- 🧩 Modal Tambah/Edit -->
  <div id="modal" class="modal-overlay">
    <div class="window" style="width: 400px;">
      <div class="title-bar">
        <div class="title-bar-text" id="modalTitle">Tambah Barang</div>
        <div class="title-bar-controls">
          <button aria-label="Close" onclick="document.getElementById('modal').style.display='none'"></button>
        </div>
      </div>
      <div class="window-body">
        <form id="barangForm">
        <input type="hidden" id="barang_id">

          <div class="field-row-stacked">
            <label for="barcode">Barcode</label>
            <input id="barcode" type="number" style="width: 100%;" required>
        </div>

          <div class="field-row-stacked">
            <label for="nama_barang">Nama Barang</label>
            <input id="nama_barang" type="text" style="width: 100%;" required>
            <small id="namaBarangError" style="display: none; color: red;">Nama Barang Max 50
            Karakter</small>
        </div>

          <div class="field-row-stacked">
            <label for="kategori_id">Kategori</label>
            <select id="kategori_id" style="width: 100%;" required>
            <option value="">Pilih Kategori...</option>
          </select>
        </div>

          <div style="display: flex; gap: 10px;">
            <div class="field-row-stacked" style="flex: 1;">
              <label for="harga_hna">Harga HNA</label>
              <input id="harga_hna" type="number" style="width: 100%;" required>
          </div>
            <div class="field-row-stacked" style="flex: 1;">
              <label for="satuan">Satuan</label>
              <input id="satuan" type="text" style="width: 100%;" required>
          </div>
        </div>

          <div class="field-row-stacked">
            <label for="stok">Stok Awal</label>
            <input id="stok" type="number" style="width: 100%;" required>
        </div>

          <div style="margin-top: 15px; text-align: right;">
            <button type="button" id="btnBatal">Batal</button>
            <button type="submit" class="default">Simpan</button>
        </div>

      </form>
    </div>
  </div>
  </div>


  <script src="./js/main.js"></script>
  <script src="./js/barang.js"></script>
</body>

</html>
