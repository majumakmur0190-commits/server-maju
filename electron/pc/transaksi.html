<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Transaksi Penjualan</title>
    <link rel="stylesheet" href="../node_modules/7.css/dist/7.css">
    <style>
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; background-color: #5ea0d6; font-family: "Segoe UI", sans-serif; }
        #sidebar-container { width: 100%; flex-shrink: 0; }
        main { flex-grow: 1; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 999; }

        /* Custom scrollbar */
        .item-list-container::-webkit-scrollbar {
            width: 8px;
        }

        .item-list-container::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        .item-list-container::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        .item-list-container::-webkit-scrollbar-thumb:hover {
            background: #555;
        }

        /* ============================
   UMUM: Ukuran Huruf
===============================*/
        .form-input,
        #penjualanForm input,
        #penjualanForm button {
            font-size: 12px;
            /* Ukuran default form */
        }

        .header-kolom {
            font-size: 13px;
            /* Header keranjang */
            font-weight: 600;
            color: #000;
            background: #e1e1e1;
        }

        /* ============================
   GRID KERANJANG – LEBAR KOLOM
===============================*/
        /* Pastikan grid selalu 12 kolom */
        .grid-kolom {
            display: grid;
            grid-template-columns:
                0.4fr /* No */
                5fr   /* Barang */
                1fr   /* Jumlah */
                1fr   /* Harga */
                1fr;  /* Subtotal */
        }

        /* Header keranjang */
        .header-kolom div {
            padding: 1px 1px;
            border: 1px solid #999;
        }

        /* ============================
   INPUT PELANGGAN
===============================*/
        .input-pelanggan {
            font-size: 14px;
            padding: 8px 10px;
        }

        .btn-cari {
            font-size: 14px;
            padding: 8px 14px;
        }


        /* ===================================
   STYLE BARIS KERANJANG
===================================*/
        .cart-row {
            /* grid layout inherited from .grid-kolom (each row will also have class grid-kolom) */
            gap: 2px;
            align-items: center;
            padding: 4px 3px;
            border-bottom: 1px solid #ccc;
            background: #ffffff;
            transition: background 0.2s ease;
        }

        .cart-row:hover {
            background: #e5f4fc;
        }

        /* Nomor Urut */
        .cart-item-number {
            font-size: 12px;
            color: #777;
        }

        /* Nama Barang */
        .cart-item-name {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.2;
            color: #333;
        }

        /* Input Jumlah & Harga */
        .cart-input {
            width: 100%;
            /* 7.css styles inputs automatically */
        }

        /* Subtotal */
        .cart-subtotal {
            text-align: center;
            font-size: 12px;
            font-weight: 600;
        }

        /* Tombol hapus */
        .cart-remove-btn {
            font-size: 20px;
            color: #e11d48;
            cursor: pointer;
            line-height: 1;
            transition: 0.2s;
        }

        .cart-remove-btn:hover {
            color: #be123c;
        }

        /* Context Menu Styles */
        .context-menu {
            position: fixed;
            background: white;
            border: 1px solid #8e8f8f;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 10000;
            padding: 2px;
            min-width: 120px;
        }
        .context-menu-item {
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
        }
        .context-menu-item:hover {
            background-color: #2f71cd;
            color: white;
        }
        .selected-row {
            background-color: #e5f4fc !important;
        }
    </style>
    <script>
        // Fungsi untuk menangkap tombol yang ditekan
        function handleKeyPress(event) {
            const keyPressed = event.key;  // Menyimpan tombol yang ditekan
            if (keyPressed === "Shift") {
                //arahkan ke input pencarian
                let searchInput = document.getElementById("productSearchInput");
                searchInput.focus();
                searchInput.select();
                searchInput.value = ""; // kosongkan input
            }
            if (keyPressed === "Escape") {
                //jika modal pelanggan terbuka, tutup modal
                //jika modal pelanggan tertutup,buka modal pelanggan
                let pelangganModal = document.getElementById("pelangganModal");
                if (pelangganModal.classList.contains("hidden")) {
                    console.log("Membuka modal pelanggan");
                    openPelangganModal();
                    document.getElementById("pelangganSearchInput").focus();
                    document.getElementById("pelangganSearchInput").select();
                    document.getElementById("pelangganSearchInput").value = "";
                } else {
                    console.log("Menutup modal pelanggan");
                    closePelangganModal();
                }

            }
            console.log("Tombol yang ditekan:", keyPressed);
        }

        // Menambahkan event listener untuk menangkap peristiwa keyboard
        window.addEventListener("keydown", handleKeyPress);
    </script>
</head>
 
<body>
 
    <!-- <div id="sidebar-container"></div> -->

    <!-- MAIN CONTENT -->
    <main>

        <!-- GRID: left + right -->
        <div style="display: flex; width: 100%; height: 100%; gap: 0;">

            <!-- LEFT COLUMN -->
            <div class="window" style="flex: 3; display: flex; flex-direction: column; border: 0; box-shadow: none; border-right: 1px solid #8e8f8f;">
                <div class="window-body" style="flex: 1; display: flex; flex-direction: column; margin: 0; padding: 5px; border: none; overflow: hidden;">

                <!-- FORM SECTION (fixed height content) -->
                <form id="penjualanForm" style="flex-shrink: 0;">

                    <input value="" type="hidden" id="penjualan_id" />
                    <input value="" type="hidden" id="user_id" />

                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <!-- Pelanggan -->
                        <div style="flex: 1;">
                            <label>Pelanggan</label>
                            <div style="display: flex;">
                                <input type="text" id="nama_pelanggan_display" value="PILIH PELANGGAN" readonly style="flex: 1;">
                                <button type="button" id="btnPilihPelanggan">
                                    Cari
                                </button>
                            </div>
                            <input type="hidden" id="pelanggan_id" />
                        </div>

                        <div id="note" style="display: none; background: #ffffe1; border: 1px solid #f2c779; padding: 5px;">
                            <label>
                                Pelanggan tidak bisa diubah karena sudah proses histori harga.
                                Reset transaksi dan ulangi proses dari awal.
                            </label>
                        </div>

                    </div>


                    <!-- Header Keranjang -->
                    <div class="grid-kolom header-kolom">
                        <div>No</div>
                        <div>Barang</div>
                        <div>Jumlah</div>
                        <div>Harga (Rp)</div>
                        <div>Subtotal (Rp)</div>
                    </div>
                </form>

                <!-- CART ITEMS (scrollable area) -->
                <div id="cart-items" class="item-list-container" style="flex-grow: 1; overflow-y: auto; border: 1px solid #8e8f8f; background: white;">
                    <!-- Cart items will be added here -->
                </div>

                <!-- STICKY FOOTER -->
                <div style="padding: 10px; border-top: 1px solid #8e8f8f; background: #f0f0f0; flex-shrink: 0;">
                    <div style="text-align: right; font-weight: bold; font-size: 1.5em; margin-bottom: 10px;">
                        Total: <span id="grandTotal">Rp 0</span>
                    </div>

                    <div style="text-align: right;">
                        <button type="button" id="btnReset">Reset</button>

                        <button type="button" id="btnKembali">
                            Kembali
                        </button>

                        <button type="submit" form="penjualanForm" class="default">
                            Simpan Transaksi
                        </button>

                        <button id="btnPrintInvoice" disabled>
                            Cetak Invoice
                        </button>
                    </div>
                </div>
            </div>
            </div>

            <!-- RIGHT COLUMN -->
            <div class="window" style="flex: 1; display: flex; flex-direction: column;">
                <div class="title-bar"><div class="title-bar-text">Cari Barang</div></div>
                <div class="window-body" style="flex: 1; display: flex; flex-direction: column; margin: 0; padding: 5px; border: none;">

                <!-- Search -->
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <input id="productSearchInput" type="text" placeholder="Cari barang..." style="flex: 1;">

                    <button id="syncButton" style="min-width: 30px;">
                        🔄
                    </button>
                </div>

                <div id="syncStatus" style="font-size: 10px; color: gray;"></div>

                <!-- Product list -->
                <div id="product-list" class="item-list-container" style="flex-grow: 1; overflow-y: auto; border: 1px solid #8e8f8f; background: white; padding: 5px;">
                </div>
 
                <!-- Pagination -->
                <div id="product-pagination-controls" style="margin-top: 5px; display: flex; justify-content: space-between; align-items: center;">
                    <button id="product-prev-page">
                        Prev
                    </button>

                    <span id="product-page-info"></span>

                    <button id="product-next-page">
                        Next
                    </button>
                </div>
            </div>
            </div>
        </div>
    </main>

    <!-- 🖱️ Custom Context Menu -->
    <div id="contextMenu" class="context-menu">
        <div class="context-menu-item" id="menuDelete">Hapus Item</div>
    </div>

    <!-- MODAL PILIH PELANGGAN -->
    <div id="pelangganModal" class="modal-overlay">
        <div class="window" style="width: 500px; max-height: 80vh; display: flex; flex-direction: column;">
            <div class="title-bar">
                <div class="title-bar-text">Pilih Pelanggan</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="closePelangganModal()"></button>
                </div>
            </div>
            <div class="window-body" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">

                <input type="text" id="pelangganSearchInput" placeholder="Cari nama atau ID pelanggan..." style="width: 100%; margin-bottom: 10px;">

                <div id="pelangganList" class="item-list-container" style="flex: 1; overflow-y: auto; border: 1px solid #8e8f8f; background: white;"></div>

                <div style="margin-top: 10px; display: flex; justify-content: space-between;">
                    <button id="pelanggan-prev-page">
                    Prev
                </button>

                <span id="pelanggan-page-info"></span>

                    <button id="pelanggan-next-page">
                    Next
                </button>
            </div>

                <div style="text-align: right; margin-top: 10px;">
                    <button id="btnBatalPelanggan">
                    Batal
                </button>
            </div>

        </div>
    </div>
    </div>

    <script>
        document.getElementById("btnReset").addEventListener("click", function() {
            customConfirm("Yakin ingin mereset form transaksi? Data yang belum disimpan akan hilang.", function() {
                localStorage.removeItem('penjualanData');
                location.reload();
            });
        });

        document.getElementById("btnKembali").addEventListener("click", function() {
            customConfirm("Yakin ingin kembali? Pastikan data sudah disimpan.", function() {
                window.location.href = "penjualan.html";
            });
        });
    </script>
    <script src="./js/main.js"></script>
    <script src="./js/transaksi.js"></script>

</body>

</html>
