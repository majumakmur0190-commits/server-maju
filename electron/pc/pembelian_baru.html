<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Transaksi Pembelian</title>
    <link rel="stylesheet" href="../node_modules/7.css/dist/7.css">
    <style>
        body { display: flex; flex-direction: column; height: 100vh; margin: 0; overflow: hidden; background-color: #5ea0d6; font-family: "Segoe UI", sans-serif; }
        #sidebar-container { width: 100%; flex-shrink: 0; }
        main { flex-grow: 1; padding: 0; overflow: hidden; display: flex; flex-direction: column; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 9999; }

        .item-list-container::-webkit-scrollbar { width: 8px; }
        .item-list-container::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        .item-list-container::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        .item-list-container::-webkit-scrollbar-thumb:hover { background: #555; }
        .header-kolom { font-size: 13px; font-weight: 600; color: #000; background: #e1e1e1; }
        .grid-kolom { display: grid; grid-template-columns: 0.4fr 3.5fr 1.5fr 1fr 1fr 1fr; }
        .header-kolom div { padding: 1px 1px; border: 1px solid #999; }
        .cart-row { gap: 2px; align-items: center; padding: 4px 3px; border-bottom: 1px solid #ccc; background: #ffffff; transition: background 0.2s ease; }
        .cart-row:hover { background: #e5f4fc; }
        .cart-item-number { font-size: 12px; color: #777; }
        .cart-item-name { font-size: 12px; font-weight: 600; line-height: 1.2; color: #333; }
        .cart-input { width: 100%; }
        .cart-subtotal { text-align: center; font-size: 12px; font-weight: 600; }
        .cart-remove-btn { font-size: 20px; color: #e11d48; cursor: pointer; line-height: 1; transition: 0.2s; }
        .cart-remove-btn:hover { color: #be123c; }

        /* Context Menu Styles */
        .context-menu {
            position: fixed;
            background: white;
            border: 1px solid #8e8f8f;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.2);
            display: none;
            z-index: 10000;
            padding: 2px;
        }
        .context-menu-item { padding: 4px 12px; cursor: pointer; font-size: 12px; }
        .context-menu-item:hover { background-color: #2f71cd; color: white; }

        .selected-row {
            background-color: #e5f4fc !important;
        }
    </style>
</head>
 
<body>

    <div id="sidebar-container"></div>

    <!-- MAIN CONTENT -->
    <main>

        <!-- GRID: left + right -->
        <div style="display: flex; width: 100%; height: 100%; gap: 0;">

            <!-- LEFT COLUMN -->
            <div class="window" style="flex: 3; display: flex; flex-direction: column; border: 0; box-shadow: none; border-right: 1px solid #8e8f8f;">
                <div class="title-bar"><div class="title-bar-text">Form Pembelian</div></div>
                <div class="window-body" style="flex: 1; display: flex; flex-direction: column; margin: 0; padding: 5px; border: none; overflow: hidden;">

                <!-- FORM SECTION -->
                <form id="pembelianForm" style="flex-shrink: 0;">
                    <input value="" type="hidden" id="user_id" />
                    <input value="" type="hidden" id="pembelian_id" />

                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <!-- Suplier -->
                        <div style="flex: 1;">
                            <label>Suplier</label>
                            <div style="display: flex;">
                                <input type="text" id="nama_suplier_display" value="PILIH SUPLIER" readonly style="flex: 1;">
                                <button type="button" id="btnPilihSuplier">Cari</button>
                            </div>
                            <input type="hidden" id="suplier_id" />
                        </div>

                        <!-- Tanggal & Keterangan -->
                        <div style="flex: 1;">
                            <div class="field-row-stacked">
                                <label for="tanggal">Tanggal</label>
                                <input type="date" id="tanggal" style="width: 100%;">
                            </div>
                        </div>
                    </div>
                    <div style="margin-bottom: 10px;">
                        <div class="field-row-stacked">
                            <label for="keterangan">Keterangan</label>
                            <input type="text" id="keterangan" placeholder="Catatan pembelian..." style="width: 100%;">
                        </div>
                    </div>

                    <!-- Header Keranjang -->
                    <div class="grid-kolom header-kolom">
                        <div>No</div>
                        <div>Barang</div>
                        <div>Expired</div>
                        <div>Jumlah</div>
                        <div>Harga Beli (Rp)</div>
                        <div>Subtotal (Rp)</div>
                    </div>
                </form>

                <!-- CART ITEMS -->
                <div id="cart-items" class="item-list-container" style="flex-grow: 1; overflow-y: auto; border: 1px solid #8e8f8f; background: white;"></div>

                <!-- STICKY FOOTER -->
                <div style="padding: 10px; border-top: 1px solid #8e8f8f; background: #f0f0f0; flex-shrink: 0;">
                    <div style="text-align: right; font-weight: bold; font-size: 1.5em; margin-bottom: 10px;">
                        Total: <span id="grandTotal">Rp 0</span>
                    </div>

                    <div style="text-align: right;">
                        <a href="pembelian.html"><button type="button">Kembali</button></a>
                        <button type="submit" form="pembelianForm" class="default">
                            Simpan Pembelian
                        </button>
                    </div>
                </div>
            </div>
            </div>

            <!-- RIGHT COLUMN (Product Search) -->
            <div class="window" style="flex: 1; display: flex; flex-direction: column; border: 0; box-shadow: none;">
                <div class="title-bar"><div class="title-bar-text">Cari Barang</div></div>
                <div class="window-body" style="flex: 1; display: flex; flex-direction: column; margin: 0; padding: 5px; border: none; overflow: hidden;">
                <div style="display: flex; gap: 5px; margin-bottom: 5px;">
                    <input id="productSearchInput" type="text" placeholder="Cari barang..." style="flex: 1;">
                    <button id="syncButton" style="min-width: 30px;">🔄</button>
                </div>
                <div id="syncStatus" style="font-size: 10px; color: gray;"></div>
                <div id="product-list" class="item-list-container" style="flex-grow: 1; overflow-y: auto; border: 1px solid #8e8f8f; background: white; padding: 5px;"></div>
                <div id="product-pagination-controls" style="margin-top: 5px; display: flex; justify-content: space-between; align-items: center;">
                    <button id="product-prev-page">Prev</button>
                    <span id="product-page-info"></span>
                    <button id="product-next-page">Next</button>
                </div>
            </div>
            </div>
        </div>
    </main>

    <!-- MODAL PILIH SUPLIER -->
    <div id="suplierModal" class="modal-overlay">
        <div class="window" style="width: 500px; max-height: 80vh; display: flex; flex-direction: column;">
            <div class="title-bar">
                <div class="title-bar-text">Pilih Suplier</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="document.getElementById('suplierModal').style.display='none'"></button>
                </div>
            </div>
            <div class="window-body" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
            <input type="text" id="suplierSearchInput" placeholder="Cari nama atau kode suplier..." style="width: 100%; margin-bottom: 10px;">
            
            <div id="suplierList" class="item-list-container" style="flex: 1; overflow-y: auto; border: 1px solid #8e8f8f; background: white;"></div>

            <div style="margin-top: 10px; display: flex; justify-content: space-between;">
                <button id="suplier-prev-page">Prev</button>
                <span id="suplier-page-info"></span>
                <button id="suplier-next-page">Next</button>
            </div>

            <div style="text-align: right; margin-top: 10px;">
                <button id="btnBatalSuplier">Batal</button>
            </div>
        </div>
    </div>
    </div>

    <!-- 🖱️ Custom Context Menu -->
    <div id="contextMenu" class="context-menu">
        <div class="context-menu-item" id="menuDelete">Hapus Item</div>
    </div>

    <script src="./js/main.js"></script>
    <script src="./js/pembelian_baru.js"></script>
    <script>
        // Set tanggal hari ini
        document.getElementById('tanggal').valueAsDate = new Date();
    </script>
</body>
</html>
