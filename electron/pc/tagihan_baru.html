<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <title>Form Tagihan</title>
    <link rel="stylesheet" href="../node_modules/7.css/dist/7.css">
    <style>
        body { display: flex; height: 100vh; margin: 0; overflow: hidden; background-color: #5ea0d6; font-family: "Segoe UI", sans-serif; }
        .selected-row { background-color: #7078ee !important; }
        #sidebar-container { width: 200px; height: 100%; flex-shrink: 0; }
        main { flex-grow: 1; padding: 10px; overflow: auto; display: flex; flex-direction: column; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 999; }
    </style>
</head>

<body>
    <div id="sidebar-container"></div>

    <main>
        <div class="window" style="height: 100%; display: flex; flex-direction: column;">
            <div class="title-bar">
                <div class="title-bar-text" id="formTitle">Buat Tagihan Baru</div>
            </div>
            <div class="window-body" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <form id="tagihanForm" style="display: flex; flex-direction: column; height: 100%;">
            <!-- Header Form -->
                <input type="hidden" id="tagihan_id">

            <!-- Input Utama -->
                    <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                        <div class="field-row-stacked" style="flex: 1;">
                            <label for="tagihan_tanggal">Tanggal Tagihan</label>
                            <input type="date" id="tagihan_tanggal" style="width: 100%;" required>
                </div>
                        <div class="field-row-stacked" style="flex: 1;">
                            <label for="tagihan_nama">Nama Tagihan</label>
                            <input type="text" id="tagihan_nama" style="width: 100%;" required>
                </div>
                        <div class="field-row-stacked" style="flex: 1;">
                            <label for="tagihan_setor">Total Setor (Opsional)</label>
                            <input type="number" id="tagihan_setor" value="0" style="width: 100%;">
                </div>
            </div>

            <!-- Header Detail & Tombol Tambah -->
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px;">
                        <h5 style="margin: 0;">Detail Tagihan (Transaksi Pelanggan)</h5>
                        <button type="button" onclick="openTransaksiModal()">+ Tambah Transaksi</button>
            </div>

            <!-- Tabel Detail Tagihan (Scrollable) -->
                    <div style="flex: 1; overflow: auto; border: 1px solid #8e8f8f; background: white;">
                        <table style="width: 100%;">
                            <thead>
                        <tr>
                                    <th>ID</th>
                                    <th>Pelanggan</th>
                                    <th>Tanggal Transaksi</th>
                                    <th style="text-align: right;">Subtotal</th>
                                    <th style="text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="detailTagihanTable">
                        <!-- Rows will be added here by JS -->
                    </tbody>
                </table>
            </div>

            <!-- Footer Form (Total & Tombol Aksi) -->
                    <div style="margin-top: 10px; padding-top: 10px; border-top: 1px solid #8e8f8f;">
                        <div style="text-align: right; font-weight: bold; font-size: 1.2em; margin-bottom: 10px;">
                    Total Tagihan: <span id="grandTotal">Rp 0</span>
                </div>
                        <div style="text-align: right;">
                    <!-- tombol print  -->
                            <a href="#" id="btnPrint" style="display: none;"><button type="button">Print</button></a>
                            <a href="tagihan.html"><button type="button">Kembali</button></a>
                            <button type="submit" class="default">Simpan Tagihan</button>
                </div>
            </div>
        </form>
            </div>
        </div>
    </main>

    <!-- MODAL PILIH TRANSAKSI -->
    <div id="transaksiModal" class="modal-overlay">
        <div class="window" style="width: 600px; max-height: 80vh; display: flex; flex-direction: column;">
            <div class="title-bar">
                <div class="title-bar-text">Pilih Transaksi Penjualan</div>
                <div class="title-bar-controls">
                    <button aria-label="Close" onclick="closeTransaksiModal()"></button>
                </div>
            </div>
            <div class="window-body" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <input type="text" id="transaksiSearchInput" placeholder="Cari ID, pelanggan, atau user..." style="width: 100%; margin-bottom: 10px;">

                <div style="flex: 1; overflow: auto; border: 1px solid #8e8f8f; background: white;">
                    <table style="width: 100%;">
                        <thead>
                        <tr>
                                <th>ID</th>
                                <th>Tanggal</th>
                                <th>Pelanggan</th>
                                <th style="text-align: right;">Total</th>
                                <th style="text-align: center;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="transaksiList"></tbody>
                </table>
            </div>

                <div style="margin-top: 10px; display: flex; justify-content: space-between; align-items: center;">
                    <button id="transaksi-prev-page">Prev</button>
                    <span id="transaksi-page-info"></span>
                    <button id="transaksi-next-page">Next</button>
                </div>
                <div style="text-align: right; margin-top: 10px;">
                    <button onclick="closeTransaksiModal()">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <script src="./js/main.js"></script>
    <script>
        initializeApp();

        // API URLs
        const SERVER_IP = localStorage.getItem('server_ip') || 'localhost';
        const API_TAGIHAN = `http://${SERVER_IP}:1987/maju/api/tagihan.php`;
        const API_TRANSAKSI = `http://${SERVER_IP}:1987/maju/api/transaksi.php`;

        // Form Elements
        const tombolPrint = document.getElementById('btnPrint');
        const tagihanForm = document.getElementById('tagihanForm');
        const formTitle = document.getElementById('formTitle');
        const tagihanIdInput = document.getElementById('tagihan_id');
        const tagihanTanggalInput = document.getElementById('tagihan_tanggal');
        const tagihanNamaInput = document.getElementById('tagihan_nama');
        const tagihanSetorInput = document.getElementById('tagihan_setor');
        const detailTableBody = document.getElementById('detailTagihanTable');
        const grandTotalSpan = document.getElementById('grandTotal');

        // Modal Elements
        const transaksiModal = document.getElementById('transaksiModal');
        const transaksiListBody = document.getElementById('transaksiList');
        const transaksiSearchInput = document.getElementById('transaksiSearchInput');

        let detailItems = new Map(); // Use Map to prevent duplicate transactions
        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);

        function hapuspencarianmodal() {
            transaksiSearchInput.value = "";
            transaksiSearchInput.focus();
        }

        // jika keyboard shift ditekan membuka modal tambah transaksi   
        document.addEventListener('keydown', function (event) {
            if (event.key === 'Shift') {
                openTransaksiModal();
            }
        });

        // --- Main Logic ---
        async function initializePage() {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                formTitle.textContent = "Edit Tagihan";
                tagihanIdInput.value = id;

                // Tampilkan tombol print dan set URL
                tombolPrint.style.display = "inline-block";
                tombolPrint.href = `tagihan_print.html?id=${id}`;
                tombolPrint.target = "_blank";

                // Fetch existing data
                try {
                    const res = await fetch(`${API_TAGIHAN}?id=${id}`);
                    if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
                    const result = await res.json();

                    if (result.status === 'success' && result.data) {
                        const data = result.data;
                        // console.log(data);
                        tagihanTanggalInput.value = data.tagihan_tanggal;
                        tagihanNamaInput.value = data.tagihan_nama;
                        tagihanSetorInput.value = data.tagihan_setor;

                        if (data.details && data.details.length > 0) {
                            data.details.forEach(d => {
                                const mockTransaksi = {
                                    penjualan_id: d.penjualan_id || d.detail_tagihan_id,
                                    pelanggan_id: d.tagihan_pelanggan_id,
                                    nama_pelanggan: d.nama_pelanggan || `ID: ${d.tagihan_pelanggan_id}`,
                                    tanggal: d.tanggal_transaksi || 'N/A',
                                    total: d.tagihan_subtotal
                                };
                                addTransaksiToDetail(mockTransaksi, true);
                            });
                        }
                        renderDetailTable(); // Render tabel sekali setelah semua item ditambahkan
                    } else {
                        customAlert(result.message || "Gagal memuat data tagihan.", "Error");
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                    customAlert("Gagal mengambil data dari server. Periksa koneksi atau log server.", "Error");
                }
            } else {
                tagihanTanggalInput.value = new Date().toISOString().split('T')[0];
            }
        }

        function addTransaksiToDetail(transaksi, isFromLoad = false) {
            // Batasi jumlah nota/transaksi hingga 15 per tagihan
            if (detailItems.size >= 15 && !isFromLoad) {
                customAlert("Jumlah nota sudah mencapai batas maksimum (15).\nSilakan buat tagihan baru untuk nota lainnya.", "Peringatan");
                return;
            }

            const key = String(transaksi.penjualan_id); // Selalu gunakan string sebagai key
            if (detailItems.has(key) && !isFromLoad) {
                customAlert("Transaksi ini sudah ada di dalam daftar tagihan.");
                return;
            }
            // console.log("Adding transaksi to detail:", transaksi.pelanggan_id);
            const itemData = {
                tagihan_pelanggan_id: transaksi.pelanggan_id,
                tagihan_subtotal: transaksi.total,
                tagihan_lunas: 0, // default
                penjualan_id: transaksi.penjualan_id,
                _display: {
                    pelanggan_id: transaksi.pelanggan_id,
                    penjualan_id: transaksi.penjualan_id,
                    nama_pelanggan: transaksi.nama_pelanggan,
                    tanggal: transaksi.tanggal,
                }
            };
            detailItems.set(key, itemData);

            if (!isFromLoad) {
                renderDetailTable();
                closeTransaksiModal();
            }
        }

        function removeDetailItem(key) {
            detailItems.delete(String(key)); // Pastikan key adalah string saat menghapus
            renderDetailTable();
        }

        function renderDetailTable() {
            detailTableBody.innerHTML = "";
            if (detailItems.size === 0) {
                detailTableBody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-gray-400">Belum ada transaksi ditambahkan.</td></tr>`;
            } else {
                detailItems.forEach((item, key) => {
                    const display = item._display;
                    const row = `
                        <tr data-key="${key}" class="border-b" onclick="warnabaris(this, '#detailTagihanTable')">
                            <td class="py-2 px-3 text-left">${display.penjualan_id}</td>
                            <td class="py-2 px-3">${display.nama_pelanggan || 'Umum'}</td>
                            <td class="py-2 px-3">${display.tanggal !== 'N/A' ? new Date(display.tanggal).toLocaleDateString('id-ID') : 'N/A'}</td>
                            <td class="py-2 px-3 text-right">${formatRupiah(item.tagihan_subtotal)}</td>
                            <td class="py-2 px-3 text-center">
                                <button type="button" onclick="removeDetailItem('${key}')" class="text-red-500 hover:text-red-700">&times;</button>
                            </td>
                        </tr>
                    `;
                    detailTableBody.innerHTML += row;
                });
            }
            calculateGrandTotal();
        }

        function calculateGrandTotal() {
            let total = 0;
            detailItems.forEach(item => {
                total += parseFloat(item.tagihan_subtotal);
            });
            grandTotalSpan.textContent = formatRupiah(total);
        }

        function clearSelectedRows(tableSelector) {
            document.querySelectorAll(`${tableSelector} tr`).forEach(r => {
                r.classList.remove("selected-row");
            });
        }

        function warnabaris(row, tableSelector) {
            const isSelected = row.classList.contains("selected-row");

            clearSelectedRows(tableSelector);

            if (!isSelected) {
                row.classList.add("selected-row");
            }
        }

        tagihanForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = tagihanIdInput.value;
            const detailsArray = Array.from(detailItems.values());

            if (detailsArray.length === 0) {
                customAlert("Harap tambahkan minimal satu detail transaksi.");
                return;
            }

            const dataToSend = {
                tagihan_tanggal: tagihanTanggalInput.value,
                tagihan_nama: tagihanNamaInput.value,
                tagihan_setor: tagihanSetorInput.value,
                details: detailsArray
            };
            // console.log("Data to send:", dataToSend);

            const url = id ? `${API_TAGIHAN}?id=${id}` : API_TAGIHAN;
            const method = id ? 'PUT' : 'POST';

            try { // Blok untuk menangani error koneksi/jaringan
                const res = await fetch(url, {
                    method: method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSend)
                });

                const responseText = await res.text(); // 1. Selalu baca respons sebagai teks terlebih dahulu
                try { // Blok untuk menangani error parsing JSON
                    const result = JSON.parse(responseText); // 2. Coba parse teks tersebut menjadi JSON
                    if (result.status === 'success') {
                        customAlert(result.message, "Sukses", () => {
                            window.location.href = 'tagihan.html';
                        });
                    } else {
                        customAlert(result.message, "Gagal");
                    }
                } catch (jsonError) { // 3. Jika parsing gagal, berarti respons bukan JSON. Tampilkan di console.
                    console.error("Server returned non-JSON response:", responseText);
                    customAlert("Terjadi kesalahan pada server. Silakan cek console untuk detail error.", "Error");
                }
            } catch (fetchError) { // 4. Blok ini akan menangkap error jika server tidak terjangkau
                console.error("Fetch error:", fetchError);
                customAlert("Gagal terhubung ke server.", "Error");
            }
        });

        // --- Modal Logic ---
        function openTransaksiModal() {
            transaksiModal.style.display = 'flex';
            fetchTransaksi(1, '');
            hapuspencarianmodal();
        }

        function closeTransaksiModal() {
            transaksiModal.style.display = 'none';
        }

        async function fetchTransaksi(page = 1, search = "") {
            transaksiListBody.innerHTML = `<tr><td colspan="5" class="text-center py-3">Memuat...</td></tr>`;
            try {
                const url = `${API_TRANSAKSI}?page=${page}&limit=5&search=${encodeURIComponent(search)}`;
                const res = await fetch(url);
                const result = await res.json();
                if (result.status === 'success') {
                    renderTransaksiList(result.data);
                    renderTransaksiPagination(result.pagination);
                } else {
                    transaksiListBody.innerHTML = `<tr><td colspan="5" class="text-center py-3">Gagal memuat.</td></tr>`;
                }
            } catch (error) {
                transaksiListBody.innerHTML = `<tr><td colspan="5" class="text-center py-3 text-red-500">Error koneksi.</td></tr>`;
            }
        }

        function renderTransaksiList(data) {
            transaksiListBody.innerHTML = data.map(t => `
                <tr onclick="warnabaris(this, '#transaksiList')">
                    <td>${t.penjualan_id}</td>
                    <td>${new Date(t.tanggal).toLocaleDateString('id-ID')}</td>
                    <td>${t.nama_pelanggan || 'Umum'}</td>
                    <td style="text-align: right;">${formatRupiah(t.total)}</td>
                    <td style="text-align: center;">
                        <button type="button" onclick='addTransaksiToDetail(${JSON.stringify(t)})'>Pilih</button>
                    </td>
                </tr>
            `).join('');
        }

        function renderTransaksiPagination(pagination) {
            const { page, total_pages } = pagination;
            const pageInfo = document.getElementById('transaksi-page-info');
            const prevButton = document.getElementById('transaksi-prev-page');
            const nextButton = document.getElementById('transaksi-next-page');

            pageInfo.textContent = `Hal ${page} dari ${total_pages}`;
            prevButton.disabled = page <= 1;
            nextButton.disabled = page >= total_pages;

            prevButton.onclick = () => fetchTransaksi(page - 1, transaksiSearchInput.value);
            nextButton.onclick = () => fetchTransaksi(page + 1, transaksiSearchInput.value);
        }

        let searchTimeout;
        transaksiSearchInput.addEventListener('input', (e) => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                fetchTransaksi(1, e.target.value);
            }, 300);
        });

        document.addEventListener("click", (event) => {
            if (!event.target.closest("#detailTagihanTable")) {
                clearSelectedRows("#detailTagihanTable");
            }

            if (!event.target.closest("#transaksiList")) {
                clearSelectedRows("#transaksiList");
            }
        });

        // Initial call
        initializePage();
        renderDetailTable();
    </script>
</body>

</html>
