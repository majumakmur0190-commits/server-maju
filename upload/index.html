<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Barang</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 10px;
        }

        h2 {
            text-align: center;
        }

        input,
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
        }

        button:active {
            background: #1e40af;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            margin-top: 10px;
        }

        th,
        td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f2f2f2;
        }

        .thumb {
            width: 50px;
            height: 50px;
            object-fit: contain;
        }
    </style>
</head>

<body>

    <h2>📦 DATA GAMBAR</h2>

    <!-- SEARCH -->
    <input type="text" id="search" placeholder="Cari barang..." onkeyup="searchBarang()">

    <table>
        <thead>
            <tr>
                <th>Gambar</th>
                <th>Nama Barang</th>
                <th>Barcode</th>
                <th>Aksi</th>
            </tr>
        </thead>
        <tbody id="result"></tbody>
    </table>

    <!-- MODAL EDIT -->
    <div id="modalEdit"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
        <div style="background:white; padding:20px; border-radius:8px; width:300px;">
            <h3>Edit Gambar</h3>
            <input type="hidden" id="barang_id_img">
            <input id="image_url" placeholder="URL Gambar Baru">
            <div style="display:flex; gap:10px; margin-top:10px;">
                <button onclick="closeModal()" style="background:#ccc; color:black;">Batal</button>
                <button onclick="uploadGambar()">Simpan</button>
            </div>
        </div>
    </div>

    <script>
        const API = "http://192.168.1.250:1987/maju/api/gambar.php";

        /* ========================
           SEARCH BARANG
        ======================== */
        function searchBarang() {
            const q = document.getElementById("search").value;
            const result = document.getElementById("result");

            // Tampilkan loading agar user tahu proses berjalan
            result.innerHTML = "<tr><td colspan='6' style='text-align:center'>Sedang memuat data...</td></tr>";

            fetch(`${API}?action=search&q=${q}&t=${new Date().getTime()}`)
                .then(res => {
                    if (!res.ok) {
                        return res.text().then(text => { throw new Error(text || "Server Error: " + res.status) });
                    }
                    return res.json();
                })
                .then(data => {
                    result.innerHTML = "";

                    if (data.error) throw new Error(data.error);
                    if (!Array.isArray(data)) throw new Error("Format data tidak valid (bukan array)");

                    if (data.length === 0) {
                        result.innerHTML = "<tr><td colspan='6' style='text-align:center'>Tidak ada data</td></tr>";
                        return;
                    }

                    data.forEach(b => {
                        result.innerHTML += `
                        <tr>
                            <td>${b.gambar_url ? `<img src="${b.gambar_url}" class="thumb">` : '-'}</td>
                            <td>${b.nama_barang}</td>
                            <td>${b.barcode}</td>
                            <td>
                                <button style="width:auto; padding:5px 10px; background:#f59e0b;" onclick="editGambar(${b.barang_id})">✏️ Edit</button>
                            </td>
                        </tr>
                        `;
                    });
                })
                .catch(err => {
                    console.error(err);
                    result.innerHTML = `<tr><td colspan="6" style="text-align:center; color:red;">Gagal: ${err.message}</td></tr>`;
                });
        }

        /* ========================
           UPLOAD GAMBAR
        ======================== */
        function uploadGambar() {
            const id = document.getElementById("barang_id_img").value;
            const url = document.getElementById("image_url").value;

            if (!url) {
                alert("URL Gambar tidak boleh kosong!");
                return;
            }

            const data = {
                barang_id: id,
                image_url: url
            };

            fetch(`${API}?action=update_gambar`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(data)
            })
                .then(res => res.text()) // Ambil sebagai text dulu
                .then(text => {
                    try {
                        return JSON.parse(text); // Coba parse ke JSON
                    } catch (e) {
                        throw new Error("Server Error: " + (text || "Respon kosong (Cek log PHP/Extension GD)")); 
                    }
                })
                .then(res => {
                    console.log(res);
                    console.log("Gambar berhasil diupload:", res);
                    alert("Gambar berhasil diupload");
                    closeModal();
                    searchBarang();
                })
                .catch(err => {
                    alert("Gagal upload: " + err.message);
                    console.log(err);
                });
        }

        /* ========================
           MODAL FUNCTIONS
        ======================== */
        function editGambar(id) {
            document.getElementById("barang_id_img").value = id;
            document.getElementById("image_url").value = ""; // Reset input
            document.getElementById("modalEdit").style.display = "flex";
            document.getElementById("image_url").focus();
        }

        function closeModal() {
            document.getElementById("modalEdit").style.display = "none";
        }

        /* LOAD AWAL */
        searchBarang();
    </script>

</body>

</html>
